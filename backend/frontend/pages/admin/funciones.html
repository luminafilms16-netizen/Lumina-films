<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Funciones — Admin Lumina Films</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .admin-layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 72px)}
    .admin-sidebar{background:var(--ink-1);border-right:1px solid rgba(255,255,255,.04);position:sticky;top:72px;height:calc(100vh - 72px);overflow-y:auto;display:flex;flex-direction:column}
    .sb-brand{padding:var(--s5) var(--s5) var(--s4);border-bottom:1px solid rgba(255,255,255,.04)}
    .sb-brand-sub{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--smoke);margin-top:4px}
    .sb-admin-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.2);font-size:10px;font-weight:700;color:var(--ember);margin-top:var(--s3)}
    .sb-nav{flex:1;padding:var(--s4) 0}
    .sb-section{font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-4);padding:0 var(--s5);margin:var(--s5) 0 var(--s2)}
    .sb-link{display:flex;align-items:center;gap:var(--s3);padding:10px var(--s5);color:var(--smoke);font-size:13px;font-weight:600;border-left:2px solid transparent;cursor:pointer;text-decoration:none;transition:all var(--t2) var(--ease)}
    .sb-link:hover{color:var(--mist);background:rgba(255,255,255,.02)}
    .sb-link.active{color:var(--cream);background:var(--ember-pale);border-left-color:var(--ember)}
    .sb-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sb-user{border-top:1px solid rgba(255,255,255,.04);padding:var(--s4) var(--s5);display:flex;align-items:center;gap:var(--s3)}
    .sb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--ember-dim),var(--ember));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--ink);flex-shrink:0}
    .sb-uname{font-size:13px;font-weight:600;color:var(--cream)}
    .sb-urole{font-size:11px;color:var(--smoke)}
    .admin-content{padding:var(--s7) var(--s7) var(--s9);overflow-x:hidden}
    .funcion-row{display:flex;align-items:center;gap:var(--s4);padding:var(--s4) var(--s5);background:var(--ink-2);border:1px solid rgba(255,255,255,.05);border-radius:var(--r3);margin-bottom:var(--s2);transition:border-color var(--t2) var(--ease)}
    .funcion-row:hover{border-color:rgba(212,168,67,.1)}
    .fr-time{font-family:var(--font-display);font-size:1.4rem;color:var(--cream);flex-shrink:0;width:80px}
    .fr-info{flex:1;min-width:0}
    .fr-title{font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}
    .fr-meta{font-size:12px;color:var(--smoke);margin-top:3px;display:flex;gap:var(--s3);flex-wrap:wrap;align-items:center}
    .fr-stats{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;min-width:100px}
    .fr-price{font-weight:700;color:var(--ember);font-size:14px}
    .fr-sold{font-size:11px;color:var(--smoke)}
    .mini-bar{width:80px;height:4px;background:var(--ink-3);border-radius:2px;overflow:hidden;margin-top:3px}
    .mini-fill{height:100%;background:linear-gradient(90deg,var(--ember-dim),var(--ember));border-radius:2px}
    .fr-actions{display:flex;gap:6px;flex-shrink:0}
    .conflict-box{background:rgba(224,85,85,.08);border:1px solid rgba(224,85,85,.25);border-radius:var(--r3);padding:var(--s4);margin-bottom:var(--s5)}
    .conflict-title{font-size:13px;font-weight:700;color:var(--danger);margin-bottom:var(--s3);display:flex;align-items:center;gap:8px}
    .conflict-item{font-size:12px;color:var(--mist);padding:4px 0;display:flex;align-items:center;gap:8px}
    @media(max-width:900px){.admin-layout{grid-template-columns:1fr}.admin-sidebar{display:none}}
  </style>
</head>
<body>
<main>
  <div class="admin-layout">
    <aside class="admin-sidebar"></aside>
    <div class="admin-content">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--s6);flex-wrap:wrap;gap:var(--s4)">
        <div>
          <p class="section-eyebrow">Programación</p>
          <h2 style="font-family:var(--font-display);font-size:2rem;color:var(--cream)">Funciones</h2>
          <p style="color:var(--smoke);font-size:14px;margin-top:var(--s2)" id="funcionCount">Cargando…</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="margin-right:5px"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          Nueva función
        </button>
      </div>

      <!-- Conflict warnings -->
      <div id="conflictPanel" style="display:none"></div>

      <div style="display:flex;gap:var(--s3);margin-bottom:var(--s5);flex-wrap:wrap">
        <button class="filter-pill active" data-filter="all" onclick="filterFunciones('all',this)">Todas</button>
        <button class="filter-pill" data-filter="today" onclick="filterFunciones('today',this)">Hoy</button>
        <button class="filter-pill" data-filter="upcoming" onclick="filterFunciones('upcoming',this)">Próximas</button>
        <button class="filter-pill" data-filter="past" onclick="filterFunciones('past',this)">Pasadas</button>
      </div>
      <div id="funcionList"></div>
    </div>
  </div>
</main>

<!-- MODAL FUNCIÓN (crear / editar) -->
<div class="modal-overlay" id="formModal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Nueva Función</div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div id="formAlert"></div>
    <form id="funcionForm">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">Película *</label>
        <select class="form-control" id="pelicula_id" required>
          <option value="">Seleccionar película…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Sala *</label>
        <select class="form-control" id="sala_id" required>
          <option value="">Seleccionar sala…</option>
        </select>
      </div>
      <div class="row-2">
        <div class="form-group">
          <label class="form-label">Fecha *</label>
          <input type="date" class="form-control" id="fecha" required>
        </div>
        <div class="form-group">
          <label class="form-label">Hora *</label>
          <input type="time" class="form-control" id="hora" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Precio por asiento (COP) *</label>
        <input type="number" class="form-control" id="precio" min="0" step="500" placeholder="Ej: 15000" required>
      </div>
      <div class="form-group" id="estadoGroup">
        <label class="form-label">Estado</label>
        <select class="form-control" id="estado">
          <option value="disponible">Disponible</option>
          <option value="cancelada">Cancelada</option>
        </select>
      </div>
      <div style="background:var(--ink-3);border-radius:var(--r2);padding:var(--s3) var(--s4);margin-bottom:var(--s5)">
        <p style="font-size:12px;color:var(--smoke);line-height:1.6;display:flex;gap:8px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#d4a843" style="flex-shrink:0;margin-top:1px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          El sistema valida automáticamente traslapes en la misma sala, incluyendo 15 min de limpieza entre funciones.
        </p>
      </div>
      <div style="display:flex;gap:var(--s3);justify-content:flex-end">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Crear función</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
if(!Auth.isLogged()||!Auth.isAdmin()) location.href='/pages/login.html';
renderNavbar('admin'); renderLoader();
renderAdminSidebar('funciones');

let allFunciones=[], editMode=false;

async function loadAll(){
  showLoader();
  try{
    const [fR,pR,sR]=await Promise.all([get('/funciones/admin',true),get('/peliculas'),get('/salas')]);
    allFunciones=fR.data||[];
    renderList(allFunciones);
    checkConflicts(allFunciones);
    document.getElementById('funcionCount').textContent=`${allFunciones.length} función${allFunciones.length!==1?'es':''} en total`;
    populateSelects(pR.data||[],sR.data||[]);
  }catch(e){toast('Error al cargar datos','error');}
  finally{hideLoader();}
}

function checkConflicts(funciones){
  const panel=document.getElementById('conflictPanel');
  // Group by sala + fecha
  const groups={};
  funciones.filter(f=>f.estado==='disponible').forEach(f=>{
    const k=`${f.sala_id}_${f.fecha}`;
    if(!groups[k]) groups[k]=[];
    groups[k].push(f);
  });
  const conflicts=[];
  Object.values(groups).forEach(group=>{
    if(group.length<2) return;
    group.sort((a,b)=>a.hora.localeCompare(b.hora));
    for(let i=0;i<group.length-1;i++){
      const a=group[i], b=group[i+1];
      const aEnd=timeToSec(a.hora)+(a.duracion_min||120)*60+900;
      if(aEnd>timeToSec(b.hora)){
        conflicts.push({a,b});
      }
    }
  });
  if(!conflicts.length){panel.style.display='none';return;}
  panel.style.display='';
  panel.innerHTML=`<div class="conflict-box">
    <div class="conflict-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#e05555"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
      ${conflicts.length} conflicto${conflicts.length!==1?'s':''} de horario detectado${conflicts.length!==1?'s':''}
    </div>
    ${conflicts.map(c=>`<div class="conflict-item">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="#e05555"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      <strong style="color:var(--cream)">"${c.a.pelicula}"</strong> (${fmtTime(c.a.hora)})
      <span style="color:var(--smoke)">se cruza con</span>
      <strong style="color:var(--cream)">"${c.b.pelicula}"</strong> (${fmtTime(c.b.hora)})
      — ${c.a.sala_nombre} · ${fmtDateShort(c.a.fecha)}
    </div>`).join('')}
  </div>`;
}

function timeToSec(t){ const [h,m]=t.split(':').map(Number); return h*3600+m*60; }

function filterFunciones(type,btn){
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const today=new Date().toISOString().split('T')[0];
  let list=allFunciones;
  if(type==='today') list=allFunciones.filter(f=>f.fecha===today);
  else if(type==='upcoming') list=allFunciones.filter(f=>f.fecha>today);
  else if(type==='past') list=allFunciones.filter(f=>f.fecha<today);
  renderList(list);
}

function renderList(list){
  const el=document.getElementById('funcionList');
  if(!list.length){
    el.innerHTML=`<div style="text-align:center;padding:var(--s9);color:var(--smoke)">
      <div style="width:72px;height:72px;border-radius:50%;background:var(--ink-2);display:flex;align-items:center;justify-content:center;margin:0 auto var(--s5)">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#2e2e35"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
      </div>
      <p>No hay funciones en este filtro</p></div>`;
    return;
  }
  const today=new Date().toISOString().split('T')[0];
  el.innerHTML=list.map(f=>{
    const sold=f.asientos_vendidos||0;
    const pct=Math.round(sold/150*100);
    const isPast=f.fecha<today;
    return `<div class="funcion-row anim-fade-up">
      <div class="fr-time">${fmtTime(f.hora)}</div>
      <div class="fr-info">
        <div class="fr-title">${f.pelicula}</div>
        <div class="fr-meta">
          <span>${f.sala_nombre}</span>
          <span>·</span>
          <span>${fmtDateShort(f.fecha)}</span>
          <span class="badge badge-${isPast?'cancelado':'disponible'}" style="font-size:9px">${isPast?'pasada':f.estado}</span>
        </div>
      </div>
      <div class="fr-stats">
        <div class="fr-price">${fmtMoney(f.precio)}</div>
        <div class="fr-sold">${sold}/150 vendidos</div>
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="fr-actions">
        <button class="btn btn-ghost btn-sm" title="Editar" onclick="openEdit(${f.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        </button>
        ${isPast ? `<button class="btn btn-ghost btn-sm" title="Eliminar función pasada" onclick="eliminarFuncion(${f.id},'${f.pelicula.replace(/'/g, "\'")}')" style="color:var(--danger);border-color:rgba(224,85,85,.2)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function populateSelects(peliculas,salas){
  const ps=document.getElementById('pelicula_id');
  const ss=document.getElementById('sala_id');
  ps.innerHTML='<option value="">Seleccionar película…</option>'+
    peliculas.filter(p=>p.estado==='activa').map(p=>`<option value="${p.id}">${p.titulo} (${fmtDuration(p.duracion)})</option>`).join('');
  ss.innerHTML='<option value="">Seleccionar sala…</option>'+
    salas.map(s=>`<option value="${s.id}">${s.nombre} — ${s.capacidad} asientos</option>`).join('');
}

// Devuelve la hora mínima permitida en formato "HH:MM" (ahora + 45 min)
function getMinHora(){
  const d=new Date(Date.now()+45*60*1000);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

// Actualiza el atributo min del campo hora según si la fecha seleccionada es hoy
function actualizarMinHora(){
  const fechaInput=document.getElementById('fecha');
  const horaInput=document.getElementById('hora');
  const hoy=new Date().toISOString().split('T')[0];
  if(fechaInput.value===hoy){
    horaInput.min=getMinHora();
    // Si la hora actual ya no cumple el mínimo, la limpiamos
    if(horaInput.value && horaInput.value < horaInput.min) horaInput.value='';
  } else {
    horaInput.min='00:00';
  }
}

function openModal(){
  editMode=false;
  document.getElementById('modalTitle').textContent='Nueva Función';
  document.getElementById('submitBtn').textContent='Crear función';
  document.getElementById('estadoGroup').style.display='none';
  document.getElementById('editId').value='';
  document.getElementById('formAlert').innerHTML='';
  document.getElementById('funcionForm').reset();
  const hoy=new Date().toISOString().split('T')[0];
  document.getElementById('fecha').min=hoy;
  document.getElementById('fecha').addEventListener('change',actualizarMinHora);
  actualizarMinHora();
  document.getElementById('formModal').classList.add('open');
}

async function openEdit(id){
  editMode=true;
  const f=allFunciones.find(x=>x.id===id);
  if(!f) return;
  document.getElementById('modalTitle').textContent='Editar Función';
  document.getElementById('submitBtn').textContent='Guardar cambios';
  document.getElementById('estadoGroup').style.display='';
  document.getElementById('editId').value=id;
  document.getElementById('formAlert').innerHTML='';
  document.getElementById('pelicula_id').value=f.pelicula_id;
  document.getElementById('sala_id').value=f.sala_id;
  const hoy=new Date().toISOString().split('T')[0];
  document.getElementById('fecha').min=hoy;
  document.getElementById('fecha').value=f.fecha;
  document.getElementById('fecha').addEventListener('change',actualizarMinHora);
  document.getElementById('hora').value=f.hora;
  document.getElementById('precio').value=f.precio;
  document.getElementById('estado').value=f.estado;
  actualizarMinHora();
  document.getElementById('formModal').classList.add('open');
}

function closeModal(){ document.getElementById('formModal').classList.remove('open'); }

document.getElementById('funcionForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const fa=document.getElementById('formAlert'); fa.innerHTML='';
  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent=editMode?'Guardando…':'Creando…';
  const body={
    pelicula_id:document.getElementById('pelicula_id').value,
    sala_id:document.getElementById('sala_id').value,
    fecha:document.getElementById('fecha').value,
    hora:document.getElementById('hora').value,
    precio:document.getElementById('precio').value,
    estado:document.getElementById('estado').value||'disponible',
    cliente_now:new Date().toISOString(),
    cliente_offset:new Date().getTimezoneOffset()
  };
  try{
    if(editMode){
      const id=document.getElementById('editId').value;
      await put(`/funciones/${id}`,body,true);
      toast('Función actualizada exitosamente','success');
    } else {
      await post('/funciones',body,true);
      toast('Función creada exitosamente','success');
    }
    closeModal(); loadAll();
  }catch(err){
    fa.innerHTML=`<div class="alert alert-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      ${err.message}
    </div>`;
  }finally{
    btn.disabled=false;
    btn.textContent=editMode?'Guardar cambios':'Crear función';
  }
});

async function eliminarFuncion(id, titulo){
  if(!confirm(`¿Eliminar la función de "${titulo}"? Esta acción no se puede deshacer.`)) return;
  try{
    await del(`/funciones/${id}`,true);
    toast('Función eliminada correctamente','success');
    loadAll();
  }catch(err){
    toast(err.message||'Error al eliminar la función','error');
  }
}

loadAll();
</script>
</body>
</html>
