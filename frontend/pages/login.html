<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Iniciar sesión — Lumina Films</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    html,body{height:100%;background:var(--ink)}
    .auth-wrap{
      min-height:100vh;display:flex;
      background:
        radial-gradient(ellipse at 20% 50%,rgba(212,168,67,.05) 0%,transparent 50%),
        radial-gradient(ellipse at 80% 20%,rgba(212,168,67,.04) 0%,transparent 45%),
        var(--ink);
    }
    .auth-side-left{
      flex:1;display:none;position:relative;overflow:hidden;
    }
    .auth-side-left-bg{
      position:absolute;inset:0;
      background:linear-gradient(180deg,rgba(12,12,14,.3) 0%,rgba(12,12,14,.85) 100%);
    }
    .auth-side-left-img{
      position:absolute;inset:0;
      background:url('https://image.tmdb.org/t/p/w780/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg') center center/cover no-repeat;
      background-attachment:local;
    }
    .auth-side-left-content{position:relative;z-index:2;padding:40px;display:flex;flex-direction:column;height:100%}
    .auth-side-right{
      width:100%;max-width:520px;
      display:flex;flex-direction:column;justify-content:center;
      padding:40px;
      background:var(--ink-1);
      border-left:1px solid rgba(255,255,255,.04);
    }
    @media(min-width:900px){
      .auth-side-left{display:flex;flex:1}
      .auth-side-right{width:520px;flex-shrink:0}
    }
    .back-link{
      display:inline-flex;align-items:center;gap:8px;
      color:var(--smoke);font-size:13px;font-weight:600;
      text-decoration:none;margin-bottom:40px;
      transition:color .2s ease;
    }
    .back-link:hover{color:var(--ember)}
    .back-link svg{width:16px;height:16px;fill:currentColor}
    .auth-logo-wrap{margin-bottom:36px}
    .auth-logo-text{font-family:var(--font-display);font-size:2rem;color:var(--cream);font-style:italic;text-decoration:none;display:block}
    .auth-logo-text span{color:var(--ember)}
    .auth-logo-sub{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--smoke);margin-top:3px;display:block;font-family:var(--font-body)}
    .auth-divider{display:flex;align-items:center;gap:12px;color:var(--smoke);font-size:11px;margin:20px 0}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--ink-4)}
  </style>
</head>
<body>
<div class="auth-wrap">
  <!-- Left decorative panel -->
  <div class="auth-side-left">
    <div class="auth-side-left-img"></div>
    <div class="auth-side-left-bg"></div>
    <div class="auth-side-left-content">
      <a href="/" style="font-family:var(--font-display);font-size:1.4rem;color:var(--cream);font-style:italic;text-decoration:none"><em>Lumina</em> <span style="color:var(--ember)">Films</span></a>
      <div style="margin-top:auto">
        <div style="font-family:var(--font-display);font-size:2.4rem;color:var(--cream);line-height:1.1;margin-bottom:16px;font-weight:600">"El cine es un espejo que refleja el alma"</div>
        <p style="color:rgba(196,196,207,.7);font-size:15px">La mejor experiencia cinematográfica, en la palma de tu mano.</p>
      </div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="auth-side-right">
    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Volver al inicio
    </a>
    <div class="auth-logo-wrap">
      <a href="/" class="auth-logo-text"><em>Lumina</em> <span>Films</span></a>
      <span class="auth-logo-sub">Cinema Experience</span>
    </div>

    <h2 style="font-family:var(--font-display);font-size:1.8rem;color:var(--cream);margin-bottom:6px">Bienvenido de nuevo</h2>
    <p style="color:var(--smoke);font-size:14px;margin-bottom:32px">Ingresa tus credenciales para continuar</p>

    <div id="alertBox"></div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="email" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between;align-items:center">
          Contraseña
          <a href="/pages/recuperar.html" style="font-size:11px;color:var(--smoke);text-transform:none;letter-spacing:0;font-weight:400;font-family:var(--font-body)">¿La olvidaste?</a>
        </label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:15px;font-size:13px;margin-top:8px">
        Iniciar sesión
      </button>
    </form>
    <div class="auth-divider">o</div>
    <div style="text-align:center;font-size:14px;color:var(--smoke)">
      ¿No tienes cuenta? <a href="/pages/registro.html" style="color:var(--ember);font-weight:600">Regístrate gratis</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
if(Auth.isLogged()) location.href='/';
const redirect=new URLSearchParams(location.search).get('redirect')||'/';
document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const ab=document.getElementById('alertBox');ab.innerHTML='';
  const btn=e.target.querySelector('button[type=submit]');
  btn.disabled=true;btn.textContent='Ingresando…';
  try{
    const d=await post('/auth/login',{email:document.getElementById('email').value,password:document.getElementById('password').value});
    Auth.save(d.token,d.user);
    btn.textContent='¡Bienvenido!';
    setTimeout(()=>location.href=d.user.rol==='admin'?'/pages/admin/dashboard.html':decodeURIComponent(redirect),600);
  }catch(err){
    ab.innerHTML=`<div class="alert alert-error">✕ ${err.message}</div>`;
    btn.disabled=false;btn.textContent='Iniciar sesión';
  }
});
</script>
<script>
// Inject logo after api.js is loaded
(function injectLogo(){
  const slots = document.querySelectorAll('[data-logo-slot]');
  slots.forEach(s => s.innerHTML = getLuminaLogo(parseInt(s.dataset.size)||28));
})();
</script>
</body>
</html>
