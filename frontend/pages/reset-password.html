<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Nueva contraseña — Lumina Films</title><link rel="stylesheet" href="/css/main.css"></head>
<body class="auth-page"><div class="auth-card anim-fade-up"><div class="auth-logo"><a href="/"><em>Lumina</em> <span>Films</span></a><span class="auth-logo-sub">Cinema Experience</span></div><h2 class="auth-title">Nueva contraseña</h2><p class="auth-sub">Crea tu nueva contraseña de acceso</p><div id="alertBox"></div><form id="resetForm"><div class="form-group"><label class="form-label">Nueva contraseña</label><input type="password" class="form-control" id="password" placeholder="Mínimo 8 caracteres" required minlength="8"></div><div class="form-group"><label class="form-label">Confirmar contraseña</label><input type="password" class="form-control" id="confirmPassword" placeholder="Repetir contraseña" required></div><button type="submit" class="btn btn-primary" style="width:100%;padding:15px;font-size:13px">Guardar contraseña</button></form></div>
<script src="/js/api.js"></script><script>
const token=new URLSearchParams(location.search).get('token');if(!token)location.href='/pages/recuperar.html';
document.getElementById('resetForm').addEventListener('submit',async e=>{e.preventDefault();const ab=document.getElementById('alertBox');ab.innerHTML='';const btn=e.target.querySelector('button[type=submit]');btn.disabled=true;btn.textContent='Guardando…';const pw=document.getElementById('password').value;const cp=document.getElementById('confirmPassword').value;if(pw!==cp){ab.innerHTML=`<div class="alert alert-error">✕ Las contraseñas no coinciden</div>`;btn.disabled=false;btn.textContent='Guardar contraseña';return;}try{await post('/auth/reset-password',{token,password:pw,confirmPassword:cp});ab.innerHTML=`<div class="alert alert-success">✓ Contraseña actualizada. Redirigiendo…</div>`;setTimeout(()=>location.href='/pages/login.html',2000);}catch(err){ab.innerHTML=`<div class="alert alert-error">✕ ${err.message}</div>`;btn.disabled=false;btn.textContent='Guardar contraseña';}});
</script></body></html>
