<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Recuperar contraseña — Lumina Films</title><link rel="stylesheet" href="/css/main.css"><style>html,body{background:#0c0c0e!important}.auth-page{background:radial-gradient(ellipse at 30% 70%,rgba(212,168,67,.05) 0%,transparent 55%) #0c0c0e!important}</style></head>
<body class="auth-page"><div class="auth-card anim-fade-up"><div class="auth-logo"><a href="/"><em>Lumina</em> <span>Films</span></a><span class="auth-logo-sub">Cinema Experience</span></div><h2 class="auth-title">Recuperar contraseña</h2><p class="auth-sub">Ingresa tu correo y te enviaremos un enlace de recuperación</p><div id="alertBox"></div><form id="recForm"><div class="form-group"><label class="form-label">Correo electrónico</label><input type="email" class="form-control" id="email" placeholder="tu@email.com" required></div><button type="submit" class="btn btn-primary" style="width:100%;padding:15px;font-size:13px">Enviar enlace</button></form><div class="auth-footer"><a href="/pages/login.html">← Volver al login</a></div></div>
<script src="/js/api.js"></script><script>
document.getElementById('recForm').addEventListener('submit',async e=>{e.preventDefault();const ab=document.getElementById('alertBox');ab.innerHTML='';const btn=e.target.querySelector('button[type=submit]');btn.disabled=true;btn.textContent='Enviando…';try{await post('/auth/recuperar-password',{email:document.getElementById('email').value});ab.innerHTML=`<div class="alert alert-info">◆ Si el correo existe, recibirás el enlace en breve.</div>`;}catch{ab.innerHTML=`<div class="alert alert-info">◆ Si el correo existe, recibirás el enlace en breve.</div>`;}finally{btn.disabled=false;btn.textContent='Enviar enlace';}});
</script></body></html>
