<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Películas — Admin Lumina Films</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .movie-row{display:flex;align-items:center;gap:var(--s4);padding:var(--s4);background:var(--ink-2);border:1px solid rgba(255,255,255,.05);border-radius:var(--r3);margin-bottom:var(--s2);transition:border-color var(--t2) var(--ease)}
    .movie-row:hover{border-color:rgba(212,168,67,.1)}
    .movie-row-thumb{width:44px;height:62px;border-radius:var(--r1);object-fit:cover;flex-shrink:0;background:var(--ink-3)}
    .movie-row-thumb-ph{width:44px;height:62px;border-radius:var(--r1);background:var(--ink-3);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
    .movie-row-info{flex:1;min-width:0}
    .movie-row-title{font-family:var(--font-display);font-size:1rem;color:var(--cream);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .movie-row-meta{font-size:12px;color:var(--smoke);margin-top:3px;display:flex;gap:var(--s3);flex-wrap:wrap}
    .movie-row-actions{display:flex;gap:var(--s2);flex-shrink:0}
    .empty-admin{text-align:center;padding:var(--s9);color:var(--smoke)}
    .empty-admin-icon{font-size:3rem;margin-bottom:var(--s4);display:block}
  
    .admin-layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 72px)}
    .admin-sidebar{background:var(--ink-1);border-right:1px solid rgba(255,255,255,.04);position:sticky;top:72px;height:calc(100vh - 72px);overflow-y:auto;display:flex;flex-direction:column}
    .sb-brand{padding:var(--s5) var(--s5) var(--s4);border-bottom:1px solid rgba(255,255,255,.04)}
    .sb-brand-sub{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--smoke);margin-top:4px}
    .sb-admin-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.2);font-size:10px;font-weight:700;color:var(--ember);margin-top:var(--s3)}
    .sb-nav{flex:1;padding:var(--s4) 0}
    .sb-section{font-size:9px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-4);padding:0 var(--s5);margin:var(--s5) 0 var(--s2)}
    .sb-link{display:flex;align-items:center;gap:var(--s3);padding:10px var(--s5);color:var(--smoke);font-size:13px;font-weight:600;border-left:2px solid transparent;cursor:pointer;text-decoration:none;transition:all var(--t2) var(--ease)}
    .sb-link:hover{color:var(--mist);background:rgba(255,255,255,.02)}
    .sb-link.active{color:var(--cream);background:var(--ember-pale);border-left-color:var(--ember)}
    .sb-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sb-user{border-top:1px solid rgba(255,255,255,.04);padding:var(--s4) var(--s5);display:flex;align-items:center;gap:var(--s3)}
    .sb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--ember-dim),var(--ember));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--ink);flex-shrink:0}
    .sb-uname{font-size:13px;font-weight:600;color:var(--cream)}
    .sb-urole{font-size:11px;color:var(--smoke)}
    .admin-content{padding:var(--s7) var(--s7) var(--s9);overflow-x:hidden}
    @media(max-width:900px){.admin-layout{grid-template-columns:1fr}.admin-sidebar{display:none}}
</style>
</head>
<body>
<main>
  <div class="admin-layout">
    <aside class="admin-sidebar"></aside>

    <div class="admin-content">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--s6);flex-wrap:wrap;gap:var(--s4)">
        <div>
          <p class="section-eyebrow">Catálogo</p>
          <h2 style="font-family:var(--font-display);font-size:2rem;color:var(--cream)">Películas</h2>
          <p style="color:var(--smoke);font-size:14px;margin-top:var(--s2)" id="movieCount">Cargando…</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          Nueva película
        </button>
      </div>

      <!-- Search -->
      <div style="position:relative;margin-bottom:var(--s5);max-width:400px">
        <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--smoke);pointer-events:none">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar película…"
               style="width:100%;padding:11px 16px 11px 44px;background:var(--ink-2);border:1px solid var(--ink-4);border-radius:100px;color:var(--cream);font-family:var(--font-body);font-size:14px;outline:none;transition:all var(--t2) var(--ease)"
               oninput="filterMovies(this.value)">
      </div>

      <div id="movieList"></div>
    </div>
  </div>
</main>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Nueva Película</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="formAlert"></div>
    <form id="movieForm">
      <input type="hidden" id="movieId">
      <div class="row-2">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label">Título *</label>
          <input type="text" class="form-control" id="titulo" required placeholder="Nombre de la película">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Descripción / Sinopsis *</label>
        <textarea class="form-control" id="descripcion" required placeholder="Sinopsis de la película…"></textarea>
      </div>
      <div class="row-2">
        <div class="form-group">
          <label class="form-label">Género *</label>
          <input type="text" class="form-control" id="genero" placeholder="Ej: Ciencia Ficción" required>
        </div>
        <div class="form-group">
          <label class="form-label">Duración (min) *</label>
          <input type="number" class="form-control" id="duracion" min="1" required placeholder="120">
        </div>
      </div>
      <div class="row-2">
        <div class="form-group">
          <label class="form-label">Clasificación *</label>
          <select class="form-control" id="clasificacion">
            <option>G</option><option>PG</option><option>PG-13</option>
            <option>R</option><option>+18</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-control" id="estado">
            <option value="activa">Activa</option>
            <option value="inactiva">Inactiva</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">URL del Poster (imagen)</label>
        <input type="url" class="form-control" id="imagen_url" placeholder="https://...">
      </div>
      <div class="form-group">
        <label class="form-label">URL del Trailer</label>
        <input type="url" class="form-control" id="trailer_url" placeholder="https://youtube.com/...">
      </div>
      <div style="display:flex;gap:var(--s3);justify-content:flex-end">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Guardar película</button>
      </div>
    </form>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:380px;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:var(--s4)">⚠️</div>
    <div class="modal-title" style="font-size:1.3rem;margin-bottom:var(--s3)">¿Eliminar película?</div>
    <p style="color:var(--smoke);font-size:13px;margin-bottom:var(--s6)">Esta acción no se puede deshacer. Se eliminará permanentemente.</p>
    <div style="display:flex;gap:var(--s3);justify-content:center">
      <button class="btn btn-ghost" onclick="document.getElementById('deleteModal').classList.remove('open')">Cancelar</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Eliminar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
if(!Auth.isLogged()||!Auth.isAdmin()) location.href='/pages/login.html';
renderNavbar('admin'); renderLoader();
renderAdminSidebar('peliculas');

let movies=[], deleteId=null;

async function load(){
  showLoader();
  try{
    const r=await get('/peliculas');
    movies=r.data||[];
    render(movies);
    document.getElementById('movieCount').textContent=`${movies.length} película${movies.length!==1?'s':''} en total`;
  }catch(e){toast('Error al cargar películas','error');}
  finally{hideLoader();}
}

function filterMovies(q){
  const f=q?movies.filter(m=>m.titulo.toLowerCase().includes(q.toLowerCase())):movies;
  render(f);
}

function render(list){
  const el=document.getElementById('movieList');
  if(!list.length){
    el.innerHTML=`<div class="empty-admin"><span class="empty-admin-icon">🎬</span><p>No se encontraron películas</p></div>`;
    return;
  }
  el.innerHTML=list.map(m=>`
    <div class="movie-row anim-fade-up">
      ${m.imagen_url
        ?`<img class="movie-row-thumb" src="${m.imagen_url}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${m.titulo}"><div class="movie-row-thumb-ph" style="display:none">🎬</div>`
        :`<div class="movie-row-thumb-ph">🎬</div>`}
      <div class="movie-row-info">
        <div class="movie-row-title">${m.titulo}</div>
        <div class="movie-row-meta">
          <span>${m.genero}</span>
          <span>·</span><span>${fmtDuration(m.duracion)}</span>
          <span>·</span><span>${m.clasificacion}</span>
          <span class="badge badge-${m.estado==='activa'?'disponible':'cancelado'}" style="font-size:9px">${m.estado}</span>
        </div>
      </div>
      <div class="movie-row-actions">
        <button class="btn btn-outline btn-sm" onclick="openModal(${m.id})">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete(${m.id})">Eliminar</button>
      </div>
    </div>`).join('');
}

function openModal(id=null){
  document.getElementById('formAlert').innerHTML='';
  document.getElementById('movieForm').reset();
  document.getElementById('movieId').value='';
  document.getElementById('modalTitle').textContent='Nueva Película';
  if(id){
    const m=movies.find(x=>x.id===id); if(!m) return;
    document.getElementById('modalTitle').textContent='Editar Película';
    document.getElementById('movieId').value=m.id;
    document.getElementById('titulo').value=m.titulo;
    document.getElementById('descripcion').value=m.descripcion;
    document.getElementById('duracion').value=m.duracion;
    document.getElementById('clasificacion').value=m.clasificacion;
    document.getElementById('genero').value=m.genero;
    document.getElementById('imagen_url').value=m.imagen_url||'';
    document.getElementById('trailer_url').value=m.trailer_url||'';
    document.getElementById('estado').value=m.estado;
  }
  document.getElementById('formModal').classList.add('open');
}
function closeModal(){ document.getElementById('formModal').classList.remove('open'); }

document.getElementById('movieForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const fa=document.getElementById('formAlert'); fa.innerHTML='';
  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='Guardando…';
  const id=document.getElementById('movieId').value;
  const body={
    titulo:document.getElementById('titulo').value,
    descripcion:document.getElementById('descripcion').value,
    duracion:document.getElementById('duracion').value,
    clasificacion:document.getElementById('clasificacion').value,
    genero:document.getElementById('genero').value,
    imagen_url:document.getElementById('imagen_url').value,
    trailer_url:document.getElementById('trailer_url').value,
    estado:document.getElementById('estado').value
  };
  try{
    if(id) await put(`/peliculas/${id}`,body,true);
    else   await post('/peliculas',body,true);
    toast(id?'Película actualizada':'Película creada','success');
    closeModal(); load();
  }catch(err){
    fa.innerHTML=`<div class="alert alert-error">✕ ${err.message}</div>`;
  }finally{
    btn.disabled=false; btn.textContent='Guardar película';
  }
});

function confirmDelete(id){
  deleteId=id;
  document.getElementById('deleteModal').classList.add('open');
}
document.getElementById('confirmDeleteBtn').addEventListener('click',async()=>{
  if(!deleteId) return;
  try{
    await del(`/peliculas/${deleteId}`,true);
    toast('Película eliminada','success');
    document.getElementById('deleteModal').classList.remove('open');
    load();
  }catch(err){ toast(err.message,'error'); }
});

load();
</script>
</body>
</html>
